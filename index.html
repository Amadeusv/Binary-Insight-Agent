<style>
/* ============ CYBERPUNK BASE STYLES ============ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; overflow: hidden; }
body {
  background: #0a0a10;
  color: #e0e0e8;
  font-family: 'JetBrains Mono','Fira Code','Consolas',monospace;
  -webkit-font-smoothing: antialiased;
}

/* Scanline overlay */
.scanlines::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,240,255,0.015) 2px, rgba(0,240,255,0.015) 4px
  );
}

/* Grid background */
.grid-bg {
  background-image:
    linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Neon glow */
.glow-cyan  { box-shadow: 0 0 15px rgba(0,240,255,0.15), inset 0 0 15px rgba(0,240,255,0.03); }
.glow-green { box-shadow: 0 0 15px rgba(0,255,65,0.15), inset 0 0 15px rgba(0,255,65,0.03); }
.glow-magenta { box-shadow: 0 0 15px rgba(255,0,255,0.15), inset 0 0 15px rgba(255,0,255,0.03); }

/* Glass panel */
.glass-panel {
  background: rgba(13,13,26,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(0,240,255,0.12);
  border-radius: 12px;
}

/* Blinking cursor */
.cursor-blink::after {
  content: '▌';
  animation: blink 1s step-end infinite;
  color: #00f0ff;
}
@keyframes blink { 50% { opacity: 0; } }

/* Pulse animation */
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 8px rgba(0,240,255,0.2); }
  50%     { box-shadow: 0 0 20px rgba(0,240,255,0.4); }
}
.pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

/* Slide in */
@keyframes slideIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.animate-slide { animation: slideIn 0.3s ease-out; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0a10; }
::-webkit-scrollbar-thumb { background: #1a1a35; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #00f0ff33; }

/* ASM syntax colors */
.asm-mnemonic { color: #00f0ff; }
.asm-register { color: #ff00ff; }
.asm-immediate{ color: #ffe600; }
.asm-address  { color: #00ff41; }
.asm-comment  { color: #6b6b8a; font-style: italic; }
.asm-danger   { color: #ff3366; background: rgba(255,51,102,0.1); border-radius: 2px; padding: 0 2px; }

/* Agent log colors */
.agent-decomp  { color: #00f0ff; }
.agent-deobf   { color: #ff00ff; }
.agent-vuln    { color: #ff3366; }
.agent-orch    { color: #ffe600; }
.log-highlight { color: #ff3366; background: rgba(255,51,102,0.08); border-radius: 2px; padding: 0 2px; }

/* Risk gauge */
.risk-ring { transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }

/* Dropdown */
select.cyber-select {
  background: #0d0d1a;
  color: #00f0ff;
  border: 1px solid #1a1a35;
  border-radius: 6px;
  padding: 6px 12px;
  font-family: inherit;
  font-size: 0.8rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
select.cyber-select:focus { border-color: #00f0ff; }
select.cyber-select option { background: #0d0d1a; color: #e0e0e8; }

/* Particle base */
.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: float-up linear infinite;
}
@keyframes float-up {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* Alert breathing — red border flash for the whole page */
@keyframes alert-border-pulse {
  0%, 100% { box-shadow: 0 0 0px rgba(255,51,102,0); }
  20%      { box-shadow: 0 0 18px rgba(255,51,102,0.35), inset 0 0 18px rgba(255,51,102,0.08); }
  40%      { box-shadow: 0 0 6px rgba(255,51,102,0.15), inset 0 0 6px rgba(255,51,102,0.04); }
  60%      { box-shadow: 0 0 22px rgba(255,51,102,0.45), inset 0 0 22px rgba(255,51,102,0.10); }
  80%      { box-shadow: 0 0 4px rgba(255,51,102,0.10), inset 0 0 4px rgba(255,51,102,0.02); }
}
.alert-active {
  animation: alert-border-pulse 1.6s ease-in-out infinite;
  border-color: rgba(255,51,102,0.35) !important;
}

/* Alert indicator dot */
@keyframes alert-dot-flash {
  0%, 100% { box-shadow: 0 0 4px rgba(255,51,102,0.4); background: #ff3366; }
  50%      { box-shadow: 0 0 16px rgba(255,51,102,0.9), 0 0 32px rgba(255,51,102,0.4); background: #ff6688; }
}
.alert-dot {
  animation: alert-dot-flash 0.8s ease-in-out infinite;
  width: 8px; height: 8px; border-radius: 50%; background: #ff3366;
}

<script>
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<50;i++){
    const d=document.createElement('div');
    d.className='particle';
    const s=1+Math.random()*2;
    d.style.cssText=`
      left:${Math.random()*100}%;
      width:${s}px;height:${s}px;
      background:${['#00f0ff','#ff00ff','#00ff41'][Math.floor(Math.random()*3)]};
      opacity:${0.3+Math.random()*0.4};
      animation-duration:${8+Math.random()*15}s;
      animation-delay:${Math.random()*10}s;
    `;
    c.appendChild(d);
  }
})();

function highlightAsm(code) {
  return code
    // Comments
    .replace(/(;.*)/g, '<span class="asm-comment">$1</span>')
    // Danger markers (⚠️)
    .replace(/(⚠️\s*[\u4e00-\u9fa5\w]+)/g, '<span class="asm-danger">$1</span>')
    // Registers
    .replace(/\b(r[abcd]x|r[si]|r[0-9]+[dwb]?|rsp|rbp|rip|eax|ebx|ecx|edx|esi|edi|esp|ebp|eip|rax|rcx|rdx|rbx|r8|r9|r10|r11|r12|r13|r14|r15|x[0-9]+|x29|x30|sp|w[0-9]+)\b/g, '<span class="asm-register">$1</span>')
    // Mnemonics
    .replace(/\b(mov|push|pop|call|jmp|ret|add|sub|xor|cmp|test|lea|nop|jn?z|jn?s|j[gl][et]?|j[ab][et]?|syscall|int|endbr64|leave|stp|ldp|adrp|ldr|str|cbz|cbnz|b\.(eq|ne|lt|gt|le|ge)|bl|blr|b|tst)\b/g, '<span class="asm-mnemonic">$1</span>')
    // Hex values
    .replace(/(0x[0-9A-Fa-f]+)/g, '<span class="asm-immediate">$1</span>')
    // Addresses
    .replace(/\b([0-9A-Fa-f]{7,})\b/g, '<span class="asm-address">$1</span>')
    // Numbers
    .replace(/\b(#0x[0-9A-Fa-f]+|#\d+)\b/g, '<span class="asm-immediate">$1</span>');
}

/* ---------- Middle Panel: Agent Console ---------- */
function ConsolePanel({ onAlert }) {
  const [logs, setLogs] = useState([]);
  const [typingLine, setTypingLine] = useState(null);
  const [typingText, setTypingText] = useState('');
  const [mode, setMode] = useState('init'); // 'init' | 'scripted' | 'live'
  const containerRef = useRef(null);
  const scriptedIdxRef = useRef(0);
  const charIdxRef = useRef(0);
  const stepTimerRef = useRef(null);
  const liveTimerRef = useRef(null);
  const liveSeqRef = useRef(0);

  /* Typewriter speed: 15-25ms per char */
  const typeSpeed = useCallback(() => 12 + Math.floor(Math.random() * 14), []);

  /* Scroll to bottom */
  const scrollDown = useCallback(() => {
    if (containerRef.current) {
      containerRef.current.scrollTop = containerRef.current.scrollHeight;
    }
  }, []);

  /* ---- Typewriter: type one character ---- */
  const typeChar = useCallback((line) => {
    charIdxRef.current++;
    const partial = line.msg.substring(0, charIdxRef.current);
    setTypingText(partial);
    scrollDown();

    if (charIdxRef.current >= line.msg.length) {
      /* Line complete — flush to logs */
      setTypingLine(null);
      setTypingText('');
      setLogs(prev => [...prev, { ...line, id: line.id || (scriptedIdxRef.current + '_' + Date.now()) }]);
      if (line.alert && onAlert) onAlert(true, line.msg);
      scrollDown();
      return true; // done
    }
    return false; // still typing
  }, [onAlert, scrollDown]);

  /* ---- Start typing a line ---- */
  const startTypingLine = useCallback((line) => {
    charIdxRef.current = 0;
    setTypingLine(line);
    setTypingText('');
    const speed = typeSpeed();
    const interval = setInterval(() => {
      const done = typeChar(line);
      if (done) clearInterval(interval);
    }, speed);
    return interval;
  }, [typeChar, typeSpeed]);

  /* ---- Process next scripted entry ---- */
  const processScripted = useCallback(() => {
    if (scriptedIdxRef.current >= AGENT_LOG_ENTRIES.length) {
      /* All scripted done — enter live monitoring */
      setMode('live');
      return;
    }
    const entry = AGENT_LOG_ENTRIES[scriptedIdxRef.current];
    scriptedIdxRef.current++;
    const typingInterval = startTypingLine({ ...entry, id: 's_' + scriptedIdxRef.current });

    /* After typing finishes + entry.delay, go next */
    const totalChars = entry.msg.length;
    const typeDuration = totalChars * typeSpeed() + 100; // rough estimate
    stepTimerRef.current = setTimeout(() => {
      clearInterval(typingInterval);
      processScripted();
    }, typeDuration + (entry.delay || 500));
  }, [startTypingLine, typeSpeed]);

  /* ---- Generate a live monitoring entry ---- */
  const generateLiveEntry = useCallback(() => {
    const pool = LIVE_MONITORING_POOL;
    const idx = Math.floor(Math.random() * pool.length);
    liveSeqRef.current++;
    const entry = { ...pool[idx], id: 'live_' + liveSeqRef.current + '_' + Date.now() };
    startTypingLine(entry);
  }, [startTypingLine]);

  /* ---- Start / Restart ---- */
  const start = useCallback(() => {
    /* Clean up all timers */
    clearTimeout(stepTimerRef.current);
    clearInterval(liveTimerRef.current);
    setLogs([]);
    setTypingLine(null);
    setTypingText('');
    setMode('scripted');
    scriptedIdxRef.current = 0;
    charIdxRef.current = 0;
    liveSeqRef.current = 0;
    if (onAlert) onAlert(false, '');

    /* Kick off scripted sequence */
    stepTimerRef.current = setTimeout(() => processScripted(), 400);
  }, [processScripted, onAlert]);

  /* ---- Live monitoring loop ---- */
  useEffect(() => {
    if (mode !== 'live') return;
    /* Generate first live entry immediately, then every 3-5s */
    const scheduleNext = () => {
      const delay = 3000 + Math.random() * 2000;
      return setTimeout(() => {
        generateLiveEntry();
        liveTimerRef.current = scheduleNext();
      }, delay);
    };
    liveTimerRef.current = setTimeout(() => {
      generateLiveEntry();
      liveTimerRef.current = scheduleNext();
    }, 1500);
    return () => clearTimeout(liveTimerRef.current);
  }, [mode, generateLiveEntry]);

  /* ---- Mount: auto-start ---- */
  useEffect(() => {
    start();
    return () => {
      clearTimeout(stepTimerRef.current);
      clearInterval(liveTimerRef.current);
    };
  }, []);

  /* ---- Clear alert after 2.5s ---- */
  useEffect(() => {
    if (!onAlert) return;
    /* Each time a new log with alert:true is flushed, a short-lived alert fires.
       The parent handles the timed clear. We just propagate. */
  }, [logs]);

  const agentNames = {
    decomp: 'Decompiler',
    deobf:  'Deobfuscator',
    vuln:   'VulnAssess',
    orch:   'Orchestrator',
  };
  const agentColors = {
    decomp: 'text-cyber-cyan',
    deobf:  'text-cyber-magenta',
    vuln:   'text-cyber-red',
    orch:   'text-cyber-yellow',
  };

  const isRunning = mode === 'scripted' || mode === 'live';

  return (
    <div className="glass-panel flex flex-col h-full overflow-hidden">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 border-b border-cyber-border shrink-0">
        <div className="flex items-center gap-2">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect width="14" height="14" rx="3" fill="#ff00ff22" stroke="#ff00ff" strokeWidth="0.8"/>
            <path d="M4 7 L14 7 M7 4 L7 11" stroke="#ff00ff" strokeWidth="1.2"/>
          </svg>
          <span className="text-xs font-semibold text-cyber-magenta tracking-wider">AGENT CONSOLE</span>
        </div>
        <div className="flex items-center gap-2">
          {isRunning && (
            <span className="flex items-center gap-1 text-[10px] text-cyber-magenta">
              <span className="w-1.5 h-1.5 rounded-full bg-cyber-magenta animate-pulse"></span>
              {mode === 'live' ? 'LIVE MONITORING' : 'Processing...'}
            </span>
          )}
          {mode === 'live' && (
            <div className="alert-dot" title="LIVE"></div>
          )}
          <button
            onClick={start}
            className="px-3 py-1 text-[10px] border border-cyber-magenta/40 rounded text-cyber-magenta hover:bg-cyber-magenta/10 transition-colors"
          >
            {mode === 'live' ? '↻ RESTART' : mode === 'scripted' ? '⟳ RESTART' : '▶ START'}
          </button>
        </div>
      </div>

      {/* Log area */}
      <div ref={containerRef} className="flex-1 overflow-auto p-4 font-mono text-[11.5px] leading-relaxed">
        {logs.length === 0 && !typingLine && (
          <div className="text-cyber-muted text-center mt-8 animate-pulse">Initializing analysis engine...</div>
        )}

        {/* Completed log lines */}
        {logs.map((entry, i) => (
          <div key={entry.id || i} className="flex gap-2 py-0.5 opacity-90">
            <span className={`shrink-0 ${agentColors[entry.type]}`}>
              [{agentNames[entry.type].padEnd(12)}]
            </span>
            <span className="text-cyber-white/85" dangerouslySetInnerHTML={{ __html: entry.msg }} />
          </div>
        ))}

        {/* Typing line (typewriter in progress) */}
        {typingLine && (
          <div className="flex gap-2 py-0.5">
            <span className={`shrink-0 ${agentColors[typingLine.type]}`}>
              [{agentNames[typingLine.type].padEnd(12)}]
            </span>
            <span className="text-cyber-white">
              <span dangerouslySetInnerHTML={{ __html: typingText }} />
              <span className="cursor-blink text-cyber-cyan" style={{animation:'blink 0.6s step-end infinite'}}>▌</span>
            </span>
          </div>
        )}

        {/* Live monitoring banner (shown once) */}
        {mode === 'live' && (
          <div className="mt-2 pt-2 border-t border-cyber-border/50">
            <div className="flex items-center gap-2 text-cyber-green text-[11px]">
              <span className="animate-pulse">◉</span>
              <span>LIVE MONITORING ACTIVE — 持续巡检中...</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------- Right Panel: Risk Analysis ---------- */
function RiskPanel() {
  const [riskScore, setRiskScore] = useState(0);
  const scoreRef = useRef(null);

  useEffect(() => {
    const timer = setTimeout(() => setRiskScore(78), 400);
    return () => clearTimeout(timer);
  }, []);

  const radius = 54;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (riskScore / 100) * circumference;

  const riskColor = riskScore >= 70 ? '#ff3366' : riskScore >= 40 ? '#ffe600' : '#00ff41';

  const vulnCards = [
    { id:'T1055', name:'Process Injection', sev:'HIGH', desc:'VirtualAlloc → WriteProcessMemory → CreateThread 调用链确认。' },
    { id:'T1620', name:'Reflective Code Loading', sev:'MEDIUM', desc:'检测到自解密段与动态模块加载模式。' },
    { id:'T1622', name:'Debugger Evasion', sev:'HIGH', desc:'ptrace + exit() 反调试机制，阻止动态分析。' },
    { id:'T1059', name:'Command & Scripting Interpreter', sev:'MEDIUM', desc:'检测到 system() / popen() 调用模式。' },
  ];

  return (
    <div className="glass-panel glow-magenta flex flex-col h-full overflow-hidden">
      {/* Header */}
      <div className="flex items-center gap-2 px-4 py-3 border-b border-cyber-border shrink-0">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect width="14" height="14" rx="3" fill="#ff336622" stroke="#ff3366" strokeWidth="0.8"/>
          <path d="M7 2 L7 8 M7 10 L7 10.01" stroke="#ff3366" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
        <span className="text-xs font-semibold text-cyber-red tracking-wider">RISK TOPOLOGY</span>
      </div>

      {/* Risk Score Gauge */}
      <div className="flex flex-col items-center py-4 border-b border-cyber-border/50 shrink-0">
        <div className="relative w-32 h-32">
          <svg viewBox="0 0 120 120" className="w-full h-full -rotate-90">
            <circle cx="60" cy="60" r={radius} fill="none" stroke="#1a1a35" strokeWidth="8" />
            <circle
              cx="60" cy="60" r={radius} fill="none"
              stroke={riskColor} strokeWidth="8" strokeLinecap="round"
              strokeDasharray={circumference}
              strokeDashoffset={offset}
              className="risk-ring"
              style={{ filter: `drop-shadow(0 0 8px ${riskColor}66)` }}
            />
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <span className="text-3xl font-bold" style={{color: riskColor}}>{riskScore}</span>
            <span className="text-[9px] text-cyber-muted">/ 100</span>
          </div>
        </div>
        <span className="text-[12px] font-semibold mt-2" style={{color: riskColor}}>
          {riskScore >= 70 ? 'HIGH RISK' : riskScore >= 40 ? 'MEDIUM RISK' : 'LOW RISK'}
        </span>
        <span className="text-[10px] text-cyber-muted mt-1">Threat Level</span>
      </div>

      {/* MITRE ATT&CK Cards */}
      <div className="flex-1 overflow-auto p-3 space-y-2">
        <div className="text-[10px] text-cyber-muted mb-1 tracking-wider">MITRE ATT&CK MAPPING</div>
        {vulnCards.map(card => (
          <div key={card.id} className="bg-cyber-card border border-cyber-border rounded-lg p-3 hover:border-cyber-red/30 transition-colors">
            <div className="flex items-center justify-between mb-1">
              <span className="text-[11px] font-semibold text-cyber-cyan">{card.id}</span>
              <span className={`text-[9px] px-2 py-0.5 rounded-full font-bold ${
                card.sev === 'HIGH' ? 'bg-cyber-red/20 text-cyber-red' :
                card.sev === 'MEDIUM' ? 'bg-cyber-yellow/20 text-cyber-yellow' :
                'bg-cyber-green/20 text-cyber-green'
              }`}>{card.sev}</span>
            </div>
            <div className="text-[10px] text-cyber-white/80 mb-1">{card.name}</div>
            <div className="text-[9px] text-cyber-muted leading-relaxed">{card.desc}</div>
          </div>
        ))}
      </div>

      {/* Multi-Agent Report Summary */}
      <div className="p-3 border-t border-cyber-border shrink-0">
        <div className="text-[10px] text-cyber-muted mb-2 tracking-wider">MULTI-AGENT CONSENSUS REPORT</div>
        <div className="text-[10px] text-cyber-white/75 leading-relaxed bg-cyber-card rounded-lg p-3 border border-cyber-border/50">
          <span className="text-cyber-red font-semibold">[VulnAssess]</span> 基于 Decompiler 提供的反汇编结果与 Deobfuscator 还原的控制流, 三个 Agent 交叉验证后一致判定: 该样本具备 <span className="text-cyber-red">进程注入 + 反调试 + 命令执行</span> 的完整攻击链, 建议立即隔离并深度取证分析。
        </div>
      </div>
    </div>
  );
}

/* ---------- Main Layout ---------- */
function App() {
  const [alertActive, setAlertActive] = useState(false);
  const alertTimerRef = useRef(null);

  const handleAlert = useCallback((active, msg) => {
    setAlertActive(active);
    if (active) {
      clearTimeout(alertTimerRef.current);
      alertTimerRef.current = setTimeout(() => setAlertActive(false), 2500);
    }
  }, []);

  return (
    <div className={`flex flex-col h-screen ${alertActive ? 'alert-active' : ''}`}>
      <Header alertActive={alertActive} />
      <main className="flex-1 grid grid-cols-[300px_1fr_320px] gap-0 overflow-hidden relative z-10">
        {/* Left: Disassembly */}
        <div className="p-2 pl-3">
          <DisassemblyPanel />
        </div>
        {/* Middle: Console */}
        <div className="p-2">
          <ConsolePanel onAlert={handleAlert} />
        </div>
        {/* Right: Risk */}
        <div className="p-2 pr-3">
          <RiskPanel />
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
